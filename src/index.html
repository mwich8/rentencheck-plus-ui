  <!-- Structured Data: FAQPage -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "FAQPage",
    "mainEntity": [
      {
        "@type": "Question",
        "name": "Wie viel bleibt von meiner gesetzlichen Rente wirklich übrig?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Von der Bruttorente werden Einkommensteuer (§32a EStG), Krankenversicherung (KVdR), Pflegeversicherung und der Inflationsverlust abgezogen. Bei einer Bruttorente von 1.500€ bleiben oft unter 900€ reale Kaufkraft."
        }
      },
      {
        "@type": "Question",
        "name": "Was ist die Rentenlücke?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Die Rentenlücke ist die Differenz zwischen Ihrem gewünschten Monatseinkommen im Alter und der tatsächlichen realen Kaufkraft Ihrer gesetzlichen Rente nach allen Abzügen und Inflation."
        }
      },
      {
        "@type": "Question",
        "name": "Wie wird die Inflation bei der Rente berechnet?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Die reale Kaufkraft wird mit der Formel Realwert = Nominal × (1 - i)^n berechnet, wobei i die jährliche Inflationsrate und n die Anzahl der Jahre bis zur Rente ist."
        }
      },
      {
        "@type": "Question",
        "name": "Was ist ein ETF-Sparplan für die Rente?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Ein ETF-Sparplan investiert monatlich einen festen Betrag in einen breit gestreuten Indexfonds wie den MSCI World. Historisch erzielte dieser ca. 7% Rendite pro Jahr. Bei 15+ Jahren Haltedauer gab es historisch keinen Verlust."
        }
      },
      {
        "@type": "Question",
        "name": "Ist der Rentenrechner kostenlos?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Ja, RentenCheck+ ist vollständig kostenlos. Alle Berechnungen laufen in Ihrem Browser — Ihre Daten verlassen niemals Ihren Computer."
        }
      }
    ]
  }
